<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanovian AI Dashcam Portal</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #10b981;
            --accent-warn: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Menu Navigation */
        aside { width: 260px; background-color: var(--bg-card); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 1.5rem; }
        .brand { font-size: 1.25rem; font-weight: 700; color: var(--accent); margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
        .menu-btn { background: none; border: none; color: var(--text-muted); text-align: left; padding: 0.75rem 1rem; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; margin-bottom: 0.5rem; transition: all 0.2s; }
        .menu-btn:hover, .menu-btn.active { background-color: #334155; color: var(--text-main); }
        .menu-btn.active { border-left: 4px solid var(--accent); }

        /* Core Content Workspace Panels */
        main { flex: 1; padding: 2rem; overflow-y: auto; position: relative; }
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        h2 { margin-bottom: 1.5rem; font-size: 1.75rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }

        /* Dynamic Live Feed Layout */
        .feed-container { display: flex; flex-direction: column; gap: 1rem; max-width: 800px; }
        .live-img { width: 100%; border-radius: 0.5rem; border: 2px solid #334155; background-color: #000; }
        
        /* Grid Tables For Media Inventory Extraction */
        .clip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
        .clip-card { background-color: var(--bg-card); border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .thumb-preview { width: 100%; height: 160px; background-color: #000; border-radius: 0.25rem; object-fit: cover; }
        .clip-meta { font-size: 0.85rem; color: var(--text-muted); }
        .btn-group { display: flex; gap: 0.5rem; margin-top: auto; }
        .btn { flex: 1; text-align: center; padding: 0.5rem; border-radius: 0.25rem; text-decoration: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background-color: var(--accent); color: #fff; }
        .btn-secondary { background-color: #475569; color: #fff; }

        /* Form Controls For System Configurations */
        .form-group { margin-bottom: 1.25rem; max-width: 500px; display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-size: 0.95rem; color: var(--text-muted); }
        input, select { padding: 0.65rem; background-color: var(--bg-card); border: 1px solid #334155; border-radius: 0.25rem; color: #fff; font-size: 1rem; }
        input:focus, select:focus { border-color: var(--accent); outline: none; }
    </style>
</head>
<body>

    <aside>
        <div class="brand">🛰️ Nanovian AI Portal</div>
        <button class="menu-btn active" onclick="switchView('live')">📺 Live Telemetry</button>
        <button class="menu-btn" onclick="switchView('clips'); loadClips();">📁 Incident Footage</button>
        <button class="menu-btn" onclick="switchView('settings')">⚙️ Configuration</button>
    </aside>

    <main>
        <section id="view-live" class="view-panel active">
            <h2>Live Operational View</h2>
            <div class="feed-container">
                <img class="live-img" src="/video_feed" alt="Live Stream Dashboard Interface Feed Unavailable">
                <p style="color: var(--text-muted);">🟢 Dynamic target tracking overlay engine streaming live from /dev/video0.</p>
            </div>
        </section>

        <section id="view-clips" class="view-panel">
            <h2>Logged Incident Captures</h2>
            <div id="clips-loading" style="color: var(--text-muted);">Querying system retention media storage logs...</div>
            <div id="clip-grid-target" class="clip-grid"></div>
        </section>

        <section id="view-settings" class="view-panel">
            <h2>Preferences Framework Setup</h2>
            <form id="settings-form" onsubmit="savePreferences(event)">
                <div class="form-group">
                    <label>Deployment Location Tag</label>
                    <input type="text" id="pref-location" value="Naperville, IL">
                </div>
                <div class="form-group">
                    <label>Clock Interface Metric</label>
                    <select id="pref-24h">
                        <option value="false">12-Hour format (AM/PM)</option>
                        <option value="true">24-Hour Military Layout</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Skeletal Date String Mask</label>
                    <select id="pref-date">
                        <option value="%Y-%m-%d">YYYY-MM-DD (Standard)</option>
                        <option value="%m/%d/%Y">MM/DD/YYYY (Regional)</option>
                        <option value="%d-%m-%Y">DD-MM-YYYY</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="max-width: 200px; padding: 0.75rem;">Save System Config</button>
            </form>
        </section>
    </main>

    <script>
        function switchView(viewName) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`view-${viewName}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function loadClips() {
            const container = document.getElementById('clip-grid-target');
            const loader = document.getElementById('clips-loading');
            container.innerHTML = '';
            loader.style.display = 'block';

            try {
                const res = await fetch('/list_incidents');
                const data = await res.json();
                loader.style.display = 'none';

                if (!data.incidents || data.incidents.length === 0) {
                    container.innerHTML = `<p style="color: var(--text-muted);">No incident threat files currently preserved in storage.</p>`;
                    return;
                }

                data.incidents.forEach(clip => {
                    const card = document.createElement('div');
                    card.className = 'clip-card';
                    
                    // Conditionally check if snapshot payload file is compiled
                    const imgUrl = clip.has_snapshot ? clip.snapshot_url : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%23475569" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
                    
                    card.innerHTML = `
                        <img class="thumb-preview" src="${imgUrl}" alt="Threat Snapshot">
                        <div class="clip-meta">
                            <strong>ID:</strong> ${clip.incident_id}<br>
                            <span style="font-size:0.75rem;">Type: Threat Locked Event</span>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-secondary" onclick="previewVideo('${clip.video_url}')">Preview</button>
                            <a class="btn btn-primary" href="/download_clip?clip_relative_path=incidents/${clip.incident_id}/incident_footage.mp4" download>Download</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                loader.innerText = 'Failed to fetch files from local dashboard gateway api.';
            }
        }

        function previewVideo(url) {
            // Instantly display clip using inline dynamic media modal or overlay window frame
            window.open(url, '_blank');
        }

        async function savePreferences(e) {
            e.preventDefault();
            const payload = {
                custom_location_label: document.getElementById('pref-location').value,
                time_format_24h: document.getElementById('pref-24h').value === 'true',
                date_format: document.getElementById('pref-date').value
            };

            try {
                const res = await fetch('/update_preferences', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) alert('System regional settings flashed successfully!');
            } catch (err) {
                alert('Error submitting options configuration to runtime host.');
            }
        }
    </script>
</body>
</html>
